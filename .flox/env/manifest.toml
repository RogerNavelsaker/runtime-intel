schema-version = "1.10.0"

[install]
git.pkg-path = "git"
gh.pkg-path = "gh"
direnv.pkg-path = "direnv"
jq.pkg-path = "jq"
ripgrep.pkg-path = "ripgrep"
fd.pkg-path = "fd"
bat.pkg-path = "bat"
eza.pkg-path = "eza"
bun.pkg-path = "bun"
rustup.pkg-path = "rustup"
code-intel-rust.flake = "github:RogerNavelsaker/code-intel-rust"
code-intel-ts.flake = "github:RogerNavelsaker/code-intel-ts"
repo-map.flake = "github:RogerNavelsaker/repo-map"

[vars]
WORKSPACE_OWNER = "RogerNavelsaker"
WORKSPACE_META = "runtime-intel"

[hook]
on-activate = '''
  export META_REPO_ROOT="$FLOX_ENV_PROJECT"
  export SHARED_WORKSPACE_ROOT="$(dirname "$FLOX_ENV_PROJECT")"
'''

[profile]
common = """
  alias workspace-bootstrap="$META_REPO_ROOT/scripts/bootstrap"
  alias workspace-status="$META_REPO_ROOT/scripts/status"
"""

[options]
systems = ["x86_64-linux"]
