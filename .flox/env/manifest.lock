{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "hook": {
      "on-activate": "  # Guard: Only run in the physical meta-repo directory\n  if [ \"$(pwd -P)\" != \"/home/rona/Repositories/RogerNavelsaker/runtime-intel\" ]; then\n    return\n  fi\n\n  # Symlink runtime-intel repo\n  for r in ../runtime-intel; do\n    if [ -d \"$r\" ] && [ \"$(pwd -P)\" != \"$(realpath \"$r\")\" ]; then\n      ln -snf \"$r\" .\n    fi\n  done\n"
    },
    "options": {}
  },
  "packages": []
}
